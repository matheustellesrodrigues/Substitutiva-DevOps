version: "3.9"

services:

  petclinic-98413:
    build: .
    container_name: petclinic-98413

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-98413:5432/petclinic
      SPRING_DATASOURCE_USERNAME: petclinic
      SPRING_DATASOURCE_PASSWORD: petclinic

    depends_on:
      - postgres-98413

    networks:
      - petclinic-net

  postgres-98413:
    image: postgres:16

    container_name: postgres-98413

    environment:
      POSTGRES_DB: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic

    ports:
      - "5432:5432"

    volumes:
      - petclinic-data:/var/lib/postgresql/data

    networks:
      - petclinic-net

volumes:
  petclinic-data:

networks:
  petclinic-net:
